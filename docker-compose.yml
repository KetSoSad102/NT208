services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: cvht
      POSTGRES_PASSWORD: cvht
      POSTGRES_DB: cvht
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U cvht -d cvht']
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    profiles:
      - cache
    ports:
      - '6379:6379'

  api:
    build:
      context: .
      dockerfile: apps/api-python/Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://cvht:cvht@postgres:5432/cvht
      API_PORT: 3000
      JWT_SECRET: supersecret_supersecret
      JWT_EXPIRES_IN: 12h
      DAA_DEMO_TOKEN: demo-daa-token
    ports:
      - '3000:3000'
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'python -c "import urllib.request; urllib.request.urlopen(\"http://localhost:3000/health\", timeout=5).read()"',
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://cvht:cvht@postgres:5432/cvht
      WORKER_POLL_SECONDS: 10
      DAA_AUTO_SYNC: 'false'
      DAA_SYNC_CRON: '0 23 30 6,12 *'
      DAA_CLIENT_MODE: real
      DAA_BASE_URL: http://api:3000
      DAA_API_TOKEN: demo-daa-token
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      VITE_API_BASE_URL: http://localhost:3000
      VITE_PORT: 5173
      VITE_DAA_WEB_URL: http://localhost:5174
      VITE_CVHT_WEB_URL: http://localhost:5173/dashboard
    ports:
      - '5173:5173'
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'node -e "fetch(\"http://localhost:5173\").then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"',
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  daa-web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      VITE_API_BASE_URL: http://localhost:3000
      VITE_PORT: 5174
      VITE_DEFAULT_ROUTE: /daa-demo
      VITE_DAA_WEB_URL: http://localhost:5174
      VITE_CVHT_WEB_URL: http://localhost:5173/dashboard
    ports:
      - '5174:5174'
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'node -e "fetch(\"http://localhost:5174\").then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"',
        ]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  pg_data:
